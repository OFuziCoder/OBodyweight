; OBodyNG Weight — default values for a NEW GAME (and MCM "reset to default").
; Existing saves restore their settings from the cosave instead.
; All of these are also adjustable in-game via the MCM at any time.

[Defaults]
; Master morph intensity multiplier. 0.0 - 2.5. 1.0 = calibrated to real presets.
MorphScale=1.0

; Preset orientation strength for body mode "Procedural Oriented". 0.0 - 1.0 (0.5 = 50%).
; How strongly each NPC's OBody preset pulls the procedural body toward it. No effect in the
; other two body modes. Toggleable in the MCM.
PresetOrient=0.5

; Fraction of NPCs given exaggerated "fantasy" bodies. 0.0 - 1.0 (0.15 = 15%).
FantasyRatio=0.15

; Fraction of NPCs with an "unusual body" (ultra-petite + disproportionate). 0.0 - 1.0.
UnusualRatio=0.06

; Fraction of NPCs with "unusual breasts" (extreme sag or extreme perk). 0.0 - 1.0.
BreastUnusualRatio=0.06

; Fraction of women with athletic muscle tone (visible definition). 0.0 - 1.0.
AthleticRatio=0.15

; Race coherence. 0.0 - 1.0 (1.0 = full, 0.0 = off). How strongly an NPC's RACE biases which body
; type it gets, so the world reads like Tamriel: Orcs trend big & broad (Amazon/Strongwoman/Stocky),
; Bosmer petite, Altmer tall & slender, Redguard toned, Elder soft, and so on. The full range still
; stays possible (an Orc CAN be petite, just rarely). 0 = the old race-blind uniform distribution.
RaceCoherence=1.0

; Natural women. 0.0 - 1.0 (0.20 = 20%). Fraction of women given the "natural" body profile (from BHUNP
; presets): a more moderate, wider, lower, closer-together bust with a touch more drape, a less-cinched
; wider waist, and a softer (not board-flat) belly. A natural-realistic vs curvy-fantasy axis (works on
; CBBE 3BA and BHUNP). The rest keep the curvier default. 0 disables.
NaturalRatio=0.20

; Curvy women. 0.0 - 1.0 (0.0 = off). Fraction of women given the 3BA-style curvier/less-realistic profile
; (the OPPOSITE pole of Natural: fuller perky forward-set bust, more cinched waist, flatter belly). Meant for
; BHUNP users who want some exaggerated 3BA-flavor bodies. CBBE users already get the curvy look by default,
; so it's off by default. Natural and Curvy share one roll (never collide); keep NaturalRatio+CurvyRatio <= 1.
CurvyRatio=0.0

; Base body the setup renders. 0 = Auto-detect (from the load order: BHUNP vs CBBE plugins), 1 = CBBE (3BA),
; 2 = BHUNP. Only gates which realism toggle the MCM shows (Natural for CBBE users, Curvy for BHUNP users) -
; both axes work on either body. Set manually if you run both mods and auto-detect can't decide.
BaseBody=0

; Clothed refit. 0.0 - 0.5 (0.10 = 10%). OBW's own "dressed vs nude" body adjustment: when an OBW-managed NPC
; wears body armor, the soft sliders (breasts/butt/belly) are trimmed by this fraction so clothes sit better;
; undressing restores the full body. This is the desirable half of OBody's ORefit, but owned by OBW so it
; survives OBW's re-assert (OBody's own ORefit still works for NPCs you EXCLUDE from OBW). 0 = off (dressed = nude).
ClothedRefit=0.10

; Re-roll hotkey, DirectInput scancode. 26 = the [ / { key. (Re-bindable in the MCM.)
ReRollKey=26

; Female bodies. 1 = women get OBW's procedural bodies. 0 = OBW ignores women entirely
; (no morphs); OBody/vanilla handle them. Lets you run OBW for one sex only, or disable both.
; Toggleable in the MCM (the MCM value persists per-save).
FemaleBodies=1

; Male bodies. 1 = men get procedural HIMBO bodies + weight (same systems as women).
; 0 = OBW ignores men entirely (no weight, no morphs); OBody/vanilla handle them.
; Toggleable in the MCM (the MCM value persists per-save).
MaleBodies=1

; Male build multiplier (0.0 - 2.0, default 1.0). Scales the overall male build (muscle +
; mass) uniformly, so proportions hold. Lower = slimmer men, higher = beefier. MCM-tunable.
MaleBuild=1.0

; Debug logging. 0 = off (default), 1 = on. When on, writes verbose per-NPC/per-event diagnostics
; to OBodyNGWeight.log (for troubleshooting). Warnings/errors are always logged. Toggleable in the MCM.
DebugLog=0

; Exclude-target hotkey, DirectInput scancode. 0 = unbound (default). Aim at an NPC and press it to
; exclude/include just that one NPC. (Bindable in the MCM.)
ExcludeKey=0
ExportKey=27
